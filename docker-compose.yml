version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nvidiagpt-postgres
    environment:
      POSTGRES_USER: nvidiagpt
      POSTGRES_PASSWORD: nvidiagpt
      POSTGRES_DB: nvidiagpt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nvidiagpt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nvidiagpt-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nvidiagpt-backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: nvidiagpt
      DB_PASSWORD: nvidiagpt
      DB_NAME: nvidiagpt
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8089:8089"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
